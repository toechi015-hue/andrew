kind = "web"
previewPath = "/"
title = "Your Personal Chef Kingston"
version = "1.0.0"
id = "artifacts/chef-kingston"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18483

[services.development]
run = "pnpm --filter @workspace/chef-kingston run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chef-kingston", "run", "build" ]
publicDir = "artifacts/chef-kingston/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18483"
BASE_PATH = "/"
